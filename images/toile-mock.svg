<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 760" preserveAspectRatio="xMidYMid meet">
  <g stroke="#8B2635" stroke-width="0.8" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.85">

    <!-- Top: Bird in flight -->
    <g transform="translate(40, 50)">
      <path d="M0,0 Q6,-7 12,0 Q18,-7 24,0"/>
      <path d="M4,2 L10,4"/>
    </g>

    <!-- Cloud -->
    <g transform="translate(130, 70)">
      <path d="M0,10 Q-4,4 0,0 Q4,-5 12,-2 Q22,-6 28,2 Q34,4 32,10 Z"/>
    </g>

    <!-- Door 1 (arched) -->
    <g transform="translate(55, 140)">
      <path d="M0,0 L0,60 L40,60 L40,0 Q20,-18 0,0 Z"/>
      <line x1="20" y1="-5" x2="20" y2="60"/>
      <circle cx="32" cy="32" r="1.4" fill="#8B2635" stroke="none"/>
      <circle cx="8" cy="32" r="1.4" fill="#8B2635" stroke="none"/>
      <!-- light beams -->
      <line x1="20" y1="60" x2="12" y2="78" stroke-dasharray="2,3" opacity="0.5"/>
      <line x1="20" y1="60" x2="28" y2="78" stroke-dasharray="2,3" opacity="0.5"/>
    </g>

    <!-- Botanical branch -->
    <g transform="translate(150, 200)">
      <path d="M0,0 Q-5,30 5,60"/>
      <ellipse cx="-2" cy="10" rx="6" ry="2.5" transform="rotate(-30 -2 10)"/>
      <ellipse cx="3" cy="24" rx="5" ry="2" transform="rotate(20 3 24)"/>
      <ellipse cx="-1" cy="38" rx="6" ry="2.5" transform="rotate(-25 -1 38)"/>
      <ellipse cx="5" cy="52" rx="5" ry="2" transform="rotate(15 5 52)"/>
    </g>

    <!-- Tiny figure (walker) -->
    <g transform="translate(75, 300)">
      <circle cx="0" cy="0" r="3.2"/>
      <line x1="0" y1="3.2" x2="0" y2="14"/>
      <line x1="0" y1="14" x2="-4" y2="22"/>
      <line x1="0" y1="14" x2="4" y2="22"/>
      <line x1="0" y1="7" x2="-6" y2="10"/>
      <line x1="0" y1="7" x2="6" y2="10"/>
    </g>

    <!-- Star sparkle -->
    <g transform="translate(170, 315)" stroke-width="0.7">
      <line x1="0" y1="-5" x2="0" y2="5"/>
      <line x1="-5" y1="0" x2="5" y2="0"/>
      <line x1="-3.5" y1="-3.5" x2="3.5" y2="3.5"/>
      <line x1="-3.5" y1="3.5" x2="3.5" y2="-3.5"/>
    </g>

    <!-- Small bird singing on branch -->
    <g transform="translate(150, 360)">
      <ellipse cx="0" cy="0" rx="5" ry="3"/>
      <circle cx="6" cy="-2" r="2"/>
      <line x1="7" y1="-3" x2="11" y2="-4"/>
      <line x1="0" y1="3" x2="-3" y2="6"/>
      <line x1="2" y1="3" x2="3" y2="7"/>
    </g>

    <!-- House / cottage -->
    <g transform="translate(35, 400)">
      <path d="M0,15 L0,40 L30,40 L30,15 L15,0 Z"/>
      <rect x="10" y="24" width="6" height="16"/>
      <rect x="20" y="22" width="6" height="6"/>
      <line x1="0" y1="15" x2="-3" y2="18"/>
      <line x1="30" y1="15" x2="33" y2="18"/>
      <!-- smoke -->
      <path d="M22,0 Q24,-4 22,-7 Q20,-10 23,-13" stroke-width="0.6"/>
    </g>

    <!-- Decorative scroll/swirl -->
    <g transform="translate(130, 470)">
      <path d="M0,0 Q15,-5 20,5 Q25,15 35,10 Q45,5 40,-10"/>
      <circle cx="40" cy="-10" r="2.2" fill="#8B2635" stroke="none" opacity="0.6"/>
    </g>

    <!-- Bird 2 (flying) -->
    <g transform="translate(45, 530)">
      <path d="M0,0 Q5,-6 10,0 Q15,-6 20,0"/>
      <path d="M3,1 L8,2"/>
    </g>

    <!-- Door 2 (smaller, ajar) -->
    <g transform="translate(150, 555)">
      <path d="M0,0 L0,42 L26,42 L26,0 Q13,-10 0,0 Z"/>
      <path d="M0,0 L0,42 L13,38 L13,-2 Z" opacity="0.18" fill="#8B2635" stroke="none"/>
      <line x1="13" y1="-3" x2="13" y2="42"/>
      <circle cx="20" cy="22" r="1" fill="#8B2635" stroke="none"/>
    </g>

    <!-- Flower with stem -->
    <g transform="translate(60, 630)">
      <line x1="0" y1="0" x2="0" y2="24"/>
      <circle cx="0" cy="0" r="4"/>
      <ellipse cx="0" cy="-4" rx="2" ry="3.5"/>
      <ellipse cx="-4" cy="0" rx="3.5" ry="2"/>
      <ellipse cx="4" cy="0" rx="3.5" ry="2"/>
      <ellipse cx="0" cy="4" rx="2" ry="3.5"/>
      <ellipse cx="-6" cy="12" rx="3.5" ry="1.6" transform="rotate(-30 -6 12)"/>
      <ellipse cx="6" cy="15" rx="3.5" ry="1.6" transform="rotate(40 6 15)"/>
    </g>

    <!-- Final tiny star -->
    <g transform="translate(160, 690)" stroke-width="0.7">
      <line x1="0" y1="-4" x2="0" y2="4"/>
      <line x1="-4" y1="0" x2="4" y2="0"/>
      <line x1="-2.8" y1="-2.8" x2="2.8" y2="2.8"/>
      <line x1="-2.8" y1="2.8" x2="2.8" y2="-2.8"/>
    </g>

    <!-- Bottom: butterfly -->
    <g transform="translate(110, 720)">
      <path d="M0,0 Q-8,-6 -10,2 Q-5,6 0,0"/>
      <path d="M0,0 Q8,-6 10,2 Q5,6 0,0"/>
      <line x1="0" y1="-3" x2="0" y2="4"/>
      <circle cx="0" cy="-3" r="1" fill="#8B2635" stroke="none"/>
    </g>

  </g>
</svg>
